<!DOCTYPE html>
<html>
<head>
    <title>Students List</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:40px;
    color:#fff;
}

.container{
    width:100%;
    max-width:900px;
}

h2{
    text-align:center;
    margin-bottom:25px;
    font-weight:600;
}

ul{
    list-style:none;
}

li{
    background:#ffffff;
    color:#333;
    padding:15px 20px;
    margin-bottom:15px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    transition:0.3s;
    line-height:1.6;
}

li:hover{
    transform:translateY(-5px);
    box-shadow:0 12px 25px rgba(0,0,0,0.3);
}

.label{
    font-weight:600;
    color:#2c5364;
}
        </style>
</head>
<body>

<h2>Joined Students</h2>
<ul id="list"></ul>

<script>
fetch("https://r12-backend.onrender.com/students")
.then(res => res.json())
.then(data => {
    const list = document.getElementById("list")

    data.forEach(student => {
        const li = document.createElement("li")

        li.textContent =
            "Name: " + student.name +
            " | DOB: " + student.bdate +
            " | School: " + student.school +
            " | Address: " + student.city +
            " | Phone: " + student.phone

        list.appendChild(li)
    })
})
</script>

</body>
</html>
